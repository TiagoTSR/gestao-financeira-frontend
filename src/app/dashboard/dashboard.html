<div class="container">
  <div class="dashboard-header">
    <h1 class="mb-4">Dashboard</h1>

    <div class="flex flex-wrap gap-3 align-items-center mb-4">
      <p-selectButton 
        [options]="modos" 
        [(ngModel)]="modoSelecionado" 
        optionLabel="label" 
        optionValue="value" />

      @if (modoSelecionado === 'mes') {
        <p-datepicker 
          [(ngModel)]="mesSelecionado" 
          view="month" 
          dateFormat="mm/yy" 
          [readonlyInput]="true" 
          placeholder="Selecione o mês" />
      }

      @if (modoSelecionado === 'periodo') {
        <p-datepicker 
          [(ngModel)]="intervalo" 
          selectionMode="range" 
          [readonlyInput]="true" 
          placeholder="Selecione o período" />
      }

      <p-button label="Filtrar" icon="pi pi-search" (onClick)="aplicarFiltro()" />
    </div>

    @if (periodoLabel) {
      <p class="text-secondary">
        Exibindo dados de: <strong>{{ periodoLabel }}</strong>
      </p>
    }
  </div>

  @if (carregando) {
    <div class="loading-overlay">
      <p-progressSpinner />
    </div>
  }

 <div class="charts-wrapper" [class.opacity-50]="carregando">
  
  <div class="chart-box pizza"> 
    <p-panel header="Lançamentos por categoria">
      <div class="chart-container">
        <p-chart type="pie" [data]="pieChartData" [options]="pieChartOptions" />
      </div>
    </p-panel>
  </div>

  <div class="chart-box linha">
    <p-panel header="Lançamentos por dia">
      <div class="chart-container">
        <p-chart type="line" [data]="lineChartData" [options]="lineChartOptions" />
      </div>
    </p-panel>
  </div>

</div>
</div>
